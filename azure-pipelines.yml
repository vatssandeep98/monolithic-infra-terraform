trigger:
- main

pool:
  sandeep-pool

- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(System.DefaultWorkingDirectory)/'
    backendServiceArm: 'sharma-svc'
    backendAzureRmStorageAccountName: 'sandeepstg001'
    backendAzureRmContainerName: 'sandeep-cont'
    backendAzureRmKey: 'sandeep.tfstate'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(System.DefaultWorkingDirectory)/'
    commandOptions: '-auto-approve'
    environmentServiceNameAzureRM: 'sharma-svc'

  